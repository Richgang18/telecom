[server]
host = 0.0.0.0
port = 5001

[auth]
jwt_secret = CHANGE_THIS_TO_A_RANDOM_SECRET_STRING
token_expiry_hours = 24
agent1_password = agent1pass
agent2_password = agent2pass

[signalwire]
; New SignalWire account for the Android dialer
account_sid = YOUR_PROJECT_ID
auth_token = YOUR_API_TOKEN
space_url = yourspace.signalwire.com
from_number = +1XXXXXXXXXX
webhook_base_url = https://your-ngrok-or-domain.com
sip_domain = yourspace.sip.signalwire.com

[agent_agent1]
sip_username = agent1
sip_password = sip_password_1
mobile = +1XXXXXXXXXX

[agent_agent2]
sip_username = agent2
sip_password = sip_password_2
mobile = +1XXXXXXXXXX

[deepgram]
; Get free key at deepgram.com — 200 hours/month free
api_key = YOUR_DEEPGRAM_API_KEY

[cartesia]
; Get key at cartesia.ai
api_key = YOUR_CARTESIA_API_KEY
; Find American English voice IDs at app.cartesia.ai/voices
voice_id = 5345cf08-6f37-424d-aa4d-aa6a5a6a8de5

[logging]
log_level = INFO
