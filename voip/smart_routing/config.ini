# =============================================================================
# Smart Outbound Routing — Configuration File
# =============================================================================
# Fill in all values before running the system.
# This file is read by dialer.py, agent_router.py, and voicemail_drop.py.
# =============================================================================

[twilio]
# Your Twilio Account SID (from twilio.com/console)
account_sid = ACcf15065d54bfedd91baec3cc1283561c

# Your Twilio Auth Token (from twilio.com/console)
auth_token = d6ed2e52331d7a895f2fb527cf895ef4

# Your Twilio phone number in E.164 format (e.g. +14145551000)
# This is the number that will appear as caller ID on outbound calls
from_number = +17868339866

# Twilio webhook base URL — this must be publicly reachable by Twilio
# If using Tailscale or ngrok for testing, put that URL here
# Example: https://pbx.vouchersdept.com or https://abc123.ngrok.io
# IMPORTANT: After starting ngrok, replace this with your ngrok URL
webhook_base_url = https://deranged-cupped-bulk.ngrok-free.dev

[calley]
# Calley API key (from your Calley premium account dashboard)
api_key = YOUR_CALLEY_API_KEY

# Calley team ID (found in your Calley account settings)
team_id = YOUR_CALLEY_TEAM_ID

[agents]
# Number of simultaneous outbound calls (1 per agent)
# Set to 2 for 2 agents — never dials more than available agents
max_concurrent_calls = 2

# Agent SIP extensions on the PBX (comma-separated)
# These are the Linphone extensions that answered calls connect to
agent_extensions = 101,102

# Agent names (comma-separated, same order as extensions)
agent_names = Agent 1,Agent 2

# Seconds to wait for agent to answer before marking unavailable
agent_timeout = 20

[dialer]
# Seconds to let the outbound call ring before dropping to voicemail
ring_timeout = 20

# Delay in seconds between each dialing batch
batch_delay = 2

# Contact list CSV file path (relative to this config file)
# CSV format: name,phone_number (one per line, E.164 format)
contact_list = contacts.csv

[voicemail]
# Path to the pre-recorded voicemail audio file (MP3 or WAV)
# Record your message and place the file here
voicemail_file = voicemail.mp3

# Voicemail drop delay in seconds after call is answered
# (gives time for the recipient's voicemail greeting to play)
voicemail_delay = 2

[logging]
# Log file path
log_file = smart_routing.log

# Log level: DEBUG, INFO, WARNING, ERROR
log_level = INFO
