name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'android_dialer/app/**'
      - 'android_dialer/build.gradle'
      - 'android_dialer/settings.gradle'
  workflow_dispatch:  # Allow manual trigger from GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x android_dialer/gradlew
        continue-on-error: true

      - name: Create gradlew if missing
        working-directory: android_dialer
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.4
          fi

      - name: Build Debug APK
        working-directory: android_dialer
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartDialer-debug-apk
          path: android_dialer/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Get APK info
        run: |
          echo "APK built successfully"
          ls -lh android_dialer/app/build/outputs/apk/debug/ || true
